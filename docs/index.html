<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Venture Simulation — Run Gallery</title>
  <script src="chart.umd.js"></script>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      background: #0f1419; color: #e6e6e6;
    }
    header {
      padding: 14px 22px; border-bottom: 1px solid #232b33;
      display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    }
    header h1 { font-size: 18px; margin: 0; font-weight: 600; }
    #status { font-size: 13px; color: #8b98a5; }
    #status.done { color: #4ade80; }
    #status.error { color: #f87171; }
    select {
      background: #161d24; color: #e6e6e6; border: 1px solid #232b33;
      border-radius: 8px; padding: 6px 10px; font-size: 13px; max-width: 420px;
    }
    #speed { max-width: 110px; }
    button {
      background: #1d2630; color: #e6e6e6; border: 1px solid #2e3a46;
      border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer;
    }
    button:hover:not(:disabled) { background: #243140; }
    button:disabled { opacity: .5; cursor: default; }
    .tiles { display: flex; gap: 10px; flex-wrap: wrap; margin-left: auto; }
    .tile {
      background: #161d24; border: 1px solid #232b33; border-radius: 8px;
      padding: 6px 12px; min-width: 92px;
    }
    .tile .label { font-size: 11px; color: #8b98a5; text-transform: uppercase; letter-spacing: .04em; }
    .tile .value { font-size: 18px; font-weight: 600; margin-top: 2px; }
    main { display: grid; grid-template-columns: 1fr 360px; gap: 16px; padding: 16px 22px; }
    .panel { background: #161d24; border: 1px solid #232b33; border-radius: 10px; padding: 14px; }
    .panel h2 { font-size: 13px; margin: 0 0 10px; color: #c4cdd5; font-weight: 600; }
    .charts { display: grid; gap: 16px; }
    .feed { max-height: 78vh; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { text-align: left; padding: 4px 6px; border-bottom: 1px solid #1f272f; }
    th { color: #8b98a5; font-weight: 500; position: sticky; top: 0; background: #161d24; }
    .kind-write_paper { color: #60a5fa; }
    .kind-peer_review, .kind-review_started, .kind-review_completed, .kind-review_continued { color: #4ade80; }
    .kind-bad_faith_review { color: #f87171; }
    .kind-idle, .kind-review_unavailable { color: #6b7280; }
    canvas { max-height: 300px; }
    .rates { display: flex; flex-wrap: wrap; gap: 6px 10px; margin-top: 12px; }
    .rate { font-size: 12px; color: #c4cdd5; display: inline-flex; align-items: center; gap: 5px; }
    .rate .swatch { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }
    .rate .pct { font-weight: 600; color: #e6e6e6; }
    .rate .cnt { color: #8b98a5; }
  </style>
</head>
<body>
  <header>
    <h1>Venture Simulation</h1>
    <select id="runPicker" title="Select a saved run"></select>
    <button id="replayBtn" disabled>▶ Replay</button>
    <button id="pauseBtn" disabled>⏸ Pause</button>
    <select id="speed" title="Replay speed">
      <option value="200">Slow</option>
      <option value="80" selected>Normal</option>
      <option value="25">Fast</option>
    </select>
    <span id="status">loading…</span>
    <div class="tiles">
      <div class="tile"><div class="label">Total AC</div><div class="value" id="t-total">—</div></div>
      <div class="tile"><div class="label">Gini</div><div class="value" id="t-gini">—</div></div>
      <div class="tile"><div class="label">Papers</div><div class="value" id="t-papers">—</div></div>
      <div class="tile"><div class="label">Good / Bad</div><div class="value" id="t-reviews">—</div></div>
    </div>
  </header>

  <main>
    <div class="charts">
      <div class="panel"><h2>Academic capital per agent</h2><canvas id="agentChart"></canvas></div>
      <div class="panel"><h2>System aggregates</h2><canvas id="aggChart"></canvas></div>
      <div class="panel">
        <h2>Action mix over time</h2>
        <canvas id="actionChart"></canvas>
        <div id="actionRates" class="rates"></div>
      </div>
    </div>
    <div class="panel feed">
      <h2>Action feed</h2>
      <table>
        <thead><tr><th>Day</th><th>Agent</th><th>Action</th><th>Paper</th></tr></thead>
        <tbody id="feed"></tbody>
      </table>
    </div>
  </main>

  <script>
    const PALETTE = [
      "#60a5fa","#4ade80","#f87171","#fbbf24","#a78bfa","#34d399","#f472b6",
      "#22d3ee","#fb923c","#c084fc","#818cf8","#2dd4bf","#facc15","#fca5a5",
      "#93c5fd","#86efac","#fdba74","#d8b4fe","#5eead4","#fde047"
    ];
    const color = (i) => PALETTE[i % PALETTE.length];
    // Bad-faith agents are named "Bad Agent N"; tint them red, good agents blue-green.
    const isBad = (name) => /^bad\b/i.test(name);
    const agentColor = (name, i) => isBad(name) ? "#f87171" : color(i % PALETTE.length);

    // Stable display order + colors for action kinds (kinds from Agent.py).
    const ACTION_ORDER = ["write_paper", "review_started", "review_continued",
      "review_completed", "bad_faith_review", "review_unavailable", "idle"];
    const ACTION_COLOR = {
      write_paper: "#60a5fa", review_started: "#4ade80", review_continued: "#34d399",
      review_completed: "#22d3ee", bad_faith_review: "#f87171",
      review_unavailable: "#fbbf24", idle: "#6b7280"
    };
    // Kinds present in a run, known kinds first (ACTION_ORDER), then any extras.
    function actionKinds(countsObj) {
      const present = new Set(Object.keys(countsObj || {}));
      const ordered = ACTION_ORDER.filter(k => present.has(k));
      for (const k of present) if (!ordered.includes(k)) ordered.push(k);
      return ordered;
    }
    const kindColor = (k, i) => ACTION_COLOR[k] || color(i % PALETTE.length);

    const baseOpts = {
      animation: false, responsive: true, maintainAspectRatio: false,
      interaction: { intersect: false, mode: "index" },
      scales: {
        x: { ticks: { color: "#8b98a5" }, grid: { color: "#1f272f" } },
        y: { ticks: { color: "#8b98a5" }, grid: { color: "#1f272f" } }
      }
    };

    let agentChart, aggChart, actionChart;
    const statusEl = document.getElementById("status");
    const ratesEl = document.getElementById("actionRates");
    const feedEl = document.getElementById("feed");
    const pickerEl = document.getElementById("runPicker");
    const replayBtn = document.getElementById("replayBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const speedEl = document.getElementById("speed");

    const FEED_LIMIT = 500;  // cap rendered rows; runs can have thousands of actions

    // Currently loaded run, kept so the Replay button can animate it on demand.
    let currentData = null, currentTitle = "";
    // Active playback context (null when idle/finished). `i` is the next day index
    // to draw, so pausing just stops the timer and resuming picks up at `replay.i`.
    let replay = null;
    let replayTimer = null;

    function setStatus(text, cls) {
      statusEl.textContent = text;
      statusEl.className = "";
      if (cls) statusEl.classList.add(cls);
    }

    // 100%-stacked area: one band per action kind, days on x, % share on y.
    function setupActionChart(kinds) {
      if (actionChart) actionChart.destroy();
      actionChart = new Chart(document.getElementById("actionChart"), {
        type: "line",
        data: {
          labels: [],
          datasets: kinds.map((k, i) => ({
            label: k, data: [], borderColor: kindColor(k, i),
            backgroundColor: kindColor(k, i) + "cc", borderWidth: 1,
            pointRadius: 0, fill: true, stack: "a"
          }))
        },
        options: {
          ...baseOpts,
          plugins: { legend: { labels: { color: "#c4cdd5", boxWidth: 10 } } },
          scales: {
            ...baseOpts.scales,
            y: { ...baseOpts.scales.y, stacked: true, min: 0, max: 100,
                 ticks: { ...baseOpts.scales.y.ticks, callback: (v) => v + "%" } }
          }
        }
      });
    }

    // Per-day counts of each kind: { day: { kind: n } }.
    function dayCounts(actions) {
      const out = {};
      for (const a of (actions || [])) {
        const day = out[a.day] || (out[a.day] = {});
        day[a.kind] = (day[a.kind] || 0) + 1;
      }
      return out;
    }

    // One day's normalized share (0–100) for `kind` given that day's counts.
    function dayShare(counts, kind) {
      const total = Object.values(counts || {}).reduce((s, n) => s + n, 0);
      return total ? (100 * (counts[kind] || 0)) / total : 0;
    }

    // Overall-rate chips: kind, its % of all actions, and raw count.
    function renderRates(totals) {
      const grand = Object.values(totals || {}).reduce((s, n) => s + n, 0);
      ratesEl.innerHTML = actionKinds(totals).map((k, i) => {
        const n = totals[k] || 0;
        const pct = grand ? (100 * n / grand).toFixed(1) : "0.0";
        return `<span class="rate"><span class="swatch" style="background:${kindColor(k, i)}"></span>` +
               `${k} <span class="pct">${pct}%</span> <span class="cnt">(${n})</span></span>`;
      }).join("");
    }

    function setupCharts(agentLabels) {
      if (agentChart) agentChart.destroy();
      if (aggChart) aggChart.destroy();

      agentChart = new Chart(document.getElementById("agentChart"), {
        type: "line",
        data: {
          labels: [],
          datasets: agentLabels.map((name, i) => ({
            label: name, data: [], borderColor: agentColor(name, i),
            borderWidth: 1.5, pointRadius: 0, tension: 0.15
          }))
        },
        options: { ...baseOpts, plugins: { legend: { display: agentLabels.length <= 20, labels: { color: "#c4cdd5", boxWidth: 10 } } } }
      });

      aggChart = new Chart(document.getElementById("aggChart"), {
        type: "line",
        data: {
          labels: [],
          datasets: [
            { label: "total_capital", data: [], borderColor: "#60a5fa", borderWidth: 1.5, pointRadius: 0, yAxisID: "y" },
            { label: "mean_capital",  data: [], borderColor: "#4ade80", borderWidth: 1.5, pointRadius: 0, yAxisID: "y" },
            { label: "max_capital",   data: [], borderColor: "#fbbf24", borderWidth: 1.5, pointRadius: 0, yAxisID: "y" },
            { label: "capital_gini",  data: [], borderColor: "#f472b6", borderWidth: 1.5, borderDash: [5,4], pointRadius: 0, yAxisID: "y1" }
          ]
        },
        options: {
          ...baseOpts,
          plugins: { legend: { labels: { color: "#c4cdd5", boxWidth: 10 } } },
          scales: {
            ...baseOpts.scales,
            y1: { position: "right", min: 0, max: 1, ticks: { color: "#f472b6" }, grid: { drawOnChartArea: false } }
          }
        }
      });
    }

    const last = (arr) => (arr && arr.length ? arr[arr.length - 1] : 0);
    const at = (arr, i) => (arr && i < arr.length ? arr[i] : 0);
    const actionRow = (a) =>
      `<tr><td>${a.day}</td><td>${a.agent}</td>` +
      `<td class="kind-${a.kind}">${a.kind}</td><td>${a.paper ?? ""}</td></tr>`;

    function setTiles(s, i) {  // i = day index, or use last value when omitted
      const v = (arr) => (i == null ? last(arr) : at(arr, i));
      document.getElementById("t-total").textContent  = v(s.total_capital).toFixed(1);
      document.getElementById("t-gini").textContent   = v(s.capital_gini).toFixed(3);
      document.getElementById("t-papers").textContent = Math.round(v(s.num_papers));
      document.getElementById("t-reviews").textContent =
        `${Math.round(v(s.good_faith_reviews))} / ${Math.round(v(s.bad_faith_reviews))}`;
    }

    // Instant render: draw the whole run at once (default when a run is selected).
    function renderRun(data, title) {
      stopReplay();
      currentData = data;
      currentTitle = title;
      replayBtn.disabled = false;

      const days = data.days || [];
      setupCharts(Object.keys(data.agent_capital || {}));

      agentChart.data.labels = days;
      agentChart.data.datasets.forEach(ds => { ds.data = data.agent_capital[ds.label] || []; });
      agentChart.update();

      aggChart.data.labels = days;
      aggChart.data.datasets.forEach(ds => { ds.data = (data.scalars && data.scalars[ds.label]) || []; });
      aggChart.update();

      // Action mix: normalize each day's kind-counts to a 0–100% share.
      const byDay = dayCounts(data.actions);
      let counts = data.action_counts;
      if (!counts || !Object.keys(counts).length) {  // older runs: tally from actions
        counts = {};
        for (const c of Object.values(byDay))
          for (const [k, n] of Object.entries(c)) counts[k] = (counts[k] || 0) + n;
      }
      setupActionChart(actionKinds(counts));
      actionChart.data.labels = days;
      actionChart.data.datasets.forEach(ds => {
        ds.data = days.map(day => dayShare(byDay[day], ds.label));
      });
      actionChart.update();
      renderRates(counts);

      setTiles(data.scalars || {});

      // Show the most recent actions (newest first), capped for performance.
      const actions = data.actions || [];
      feedEl.innerHTML = actions.slice(-FEED_LIMIT).reverse().map(actionRow).join("");

      setStatus(`${title} — ${days.length} days`, "done");
    }

    // Reset to no-playback state (used on load and when switching runs).
    function stopReplay() {
      if (replayTimer) { clearInterval(replayTimer); replayTimer = null; }
      replay = null;
      pauseBtn.disabled = true;
      pauseBtn.textContent = "⏸ Pause";
    }

    // One animation frame: draw day `replay.i`, then advance it.
    function replayTick() {
      const { days, s, agentCap, byDay, byDayCounts, runningCounts, title } = replay;
      if (replay.i >= days.length) {       // reached the end
        clearInterval(replayTimer);
        replayTimer = null;
        replay = null;
        pauseBtn.disabled = true;
        pauseBtn.textContent = "⏸ Pause";
        setStatus(`${title} — ${days.length} days ✓`, "done");
        return;
      }
      const i = replay.i;
      const day = days[i];

      agentChart.data.labels.push(day);
      agentChart.data.datasets.forEach(ds => ds.data.push(at(agentCap[ds.label], i)));
      agentChart.update();

      aggChart.data.labels.push(day);
      aggChart.data.datasets.forEach(ds => ds.data.push(at(s[ds.label], i)));
      aggChart.update();

      const dayCnt = byDayCounts[day] || {};
      actionChart.data.labels.push(day);
      actionChart.data.datasets.forEach(ds => ds.data.push(dayShare(dayCnt, ds.label)));
      actionChart.update();
      for (const [k, n] of Object.entries(dayCnt)) runningCounts[k] = (runningCounts[k] || 0) + n;
      renderRates(runningCounts);

      setTiles(s, i);

      for (const a of (byDay[day] || [])) feedEl.insertAdjacentHTML("afterbegin", actionRow(a));
      while (feedEl.childElementCount > FEED_LIMIT) feedEl.lastElementChild.remove();

      setStatus(`replaying ${title} — day ${day} / ${days[days.length - 1]}`);
      replay.i++;
    }

    function armTimer() {
      if (replayTimer) clearInterval(replayTimer);
      replayTimer = setInterval(replayTick, Number(speedEl.value));
    }

    // Animated playback from day 0: step through the already-loaded run day by day,
    // exactly like the live dashboard — but driven from saved data, no server needed.
    function startReplay() {
      if (!currentData) return;
      stopReplay();
      const data = currentData;
      setupCharts(Object.keys(data.agent_capital || {}));
      setupActionChart(actionKinds(data.action_counts || {}));
      feedEl.innerHTML = "";
      ratesEl.innerHTML = "";

      // Group actions by day so each frame can append just that day's events.
      const byDay = {};
      for (const a of (data.actions || [])) {
        if (!byDay[a.day]) byDay[a.day] = [];
        byDay[a.day].push(a);
      }

      replay = {
        days: data.days || [], s: data.scalars || {},
        agentCap: data.agent_capital || {}, byDay,
        byDayCounts: dayCounts(data.actions), runningCounts: {},
        i: 0, title: currentTitle,
      };
      pauseBtn.disabled = false;
      pauseBtn.textContent = "⏸ Pause";
      armTimer();
    }

    function pauseReplay() {
      clearInterval(replayTimer);
      replayTimer = null;
      pauseBtn.textContent = "▶ Resume";
      setStatus(`paused — day ${at(replay.days, replay.i - 1)} / ${last(replay.days)}`);
    }

    function resumeReplay() {
      pauseBtn.textContent = "⏸ Pause";
      armTimer();
    }

    replayBtn.addEventListener("click", startReplay);  // always restarts from the top
    pauseBtn.addEventListener("click", () => {
      if (!replay) return;
      replayTimer ? pauseReplay() : resumeReplay();
    });
    // Apply a new speed immediately if we're mid-playback (keeps current position).
    speedEl.addEventListener("change", () => { if (replayTimer) armTimer(); });

    async function loadRun(id, title) {
      stopReplay();
      setStatus(`loading ${title}…`);
      try {
        const res = await fetch(`data/${id}/history.json`, { cache: "no-cache" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        renderRun(await res.json(), title);
      } catch (err) {
        setStatus(`couldn't load run (${err.message})`, "error");
      }
    }

    function describe(run) {
      const c = run.config || {};
      const parts = [];
      if (c.num_agents != null) parts.push(`${c.num_agents} good`);
      if (c.num_bad_agents != null) parts.push(`${c.num_bad_agents} bad`);
      if (run.num_days != null) parts.push(`${run.num_days}d`);
      return parts.length ? `${run.title} (${parts.join(", ")})` : run.title;
    }

    async function init() {
      let runs;
      try {
        const res = await fetch("data/index.json", { cache: "no-cache" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        runs = await res.json();
      } catch (err) {
        setStatus("no runs found — run the simulation and commit docs/data", "error");
        return;
      }
      if (!Array.isArray(runs) || runs.length === 0) {
        setStatus("no runs yet — run the simulation to add one", "error");
        return;
      }

      pickerEl.innerHTML = "";
      for (const run of runs) {
        const opt = document.createElement("option");
        opt.value = run.id;
        opt.textContent = describe(run);
        opt.dataset.title = run.title;
        pickerEl.appendChild(opt);
      }

      pickerEl.addEventListener("change", () => {
        const opt = pickerEl.selectedOptions[0];
        loadRun(opt.value, opt.dataset.title);
      });

      // Manifest is sorted newest-first, so the first option is the latest run.
      loadRun(runs[0].id, runs[0].title);
    }

    init();
  </script>
</body>
</html>
